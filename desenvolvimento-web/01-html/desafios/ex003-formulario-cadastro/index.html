<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de cadastro</title>

  <style>
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }
    form{
      background-color: antiquewhite;
      box-sizing: border-box;
      width: 50%;
      height: 400px;
      border-radius: 10px;
      box-shadow: 1px 1px rgb(92, 66, 66);
      display: grid;
      
    }

    form:hover{
      transform: scale(1.05);
      transition: 1.2s;
      cursor: pointer;
  
    }

    form h1{
      font-family: Arial, Helvetica, sans-serif;
    }
    label{
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;

      span{
        padding-right: 3px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1.1em;
      }

      input {
        border: none;
        border-radius: 33px;
        padding: 5px;
      }
    }
    h1 {
      text-align: center;
    }

    .botao{
      margin: 0 auto;
      width: 200px;
      padding: 10px;
    }

  </style>
</head>
<body>
  <form action="post">
    <h1>Formulario de Cadastro</h1>
    <label for="nome-usuario">
      <span>Nome:</span>
      <input type="text" placeholder="seu nome">
    </label>
    <label for="email-usuario">
      <span>Email:</span>
      <input type="email" name="" id="">
    </label>
    <label for="senha-usuario">
      <span>Senha:</span>
      <input type="password">
    </label>
    <label for="">
      <span>Idade:</span>
      <input type="text">
    </label>
    <label for=""><input class="botao" type="submit" value="Enviar"></label>
  </form>
</body>
</html>
