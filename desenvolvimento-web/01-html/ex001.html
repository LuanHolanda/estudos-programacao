<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ex001 HTML</title>
</head>
<body>
<!-- 
EX001 - Praticando Tags HTML

Objetivo:
- Criar um título
- Inserir um parágrafo
- Adicionar uma imagem
- Criar links
- Fazer uma tabela
- Criar um formulário simples
-->

<!-- TITULO -->
 <h1>Minha Primeira Página HTML</h1>

<!-- PARÁGRAFO -->
  <P>Esta página foi criada para praticar as principais tahs HTML.</P>

  <!-- LINK -->
   <h2>Links</h2>
  <a href="https://google.com" target="_blank">Aessar Google</a>
  <br><br>
  <a href="https://youtube.com" target="_blank">Acessar YouTube</a>

  <!-- IMAGEM -->
  <h2>Imagem</h2>
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRyHCW1Uw5t2nTLwa6BhMx4RFE2heuXSox3Yw&s" alt="Imagem de Exemplo">

  <!-- TABELA -->
  <h2>Tabela</h2>
  <table width="30%" border="1">
    <tr>
      <th>Nome</th>
      <th>Idade</th>
    </tr>
    <tr>
      <td>Luan</td>
      <td>24</td>
    </tr>
  </table>

  <!-- FORMULÁRIO -->
  <h2>Formulário</h2>
  <form>
    <label>Nome:</label>
    <br>
    <input type="text">
    <br><br>
    <label>Email:</label>
    <br>
    <input type="email">
    <br><br>
    <label>Senha:</label>
    <br>

    <input type="password">
    <br><br>
    <button type="submit">Enviar</button>
  </form>
</body>
</html>
